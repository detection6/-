<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测报告查询</title>

<style>
body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial;
}

.top{
    background:#1d9acb;
    color:white;
    text-align:center;
    padding:16px;
    font-size:20px;
    font-weight:500;
    letter-spacing:1px;
}

.card{
    background:white;
    margin:18px;
    border-radius:4px;
    overflow:hidden;
}

.row{
    display:flex;
    border-bottom:1px solid #e5e5e5;
    min-height:72px;
}

.left{
    width:32%;
    background:#9ec8e5;
    padding:16px;
    font-size:15px;
    font-weight:600;
    line-height:1.8;
    box-sizing:border-box;
}

.right{
    width:68%;
    padding:16px;
    font-size:15px;
    line-height:1.8;
    color:#333;
    box-sizing:border-box;
}

.footer{
    text-align:center;
    color:#999;
    margin-top:30px;
    font-size:16px;
}

</style>
</head>

<body>

<div class="header">
    <div class="header-title">检测报告查询系统</div>
    <div class="header-sub">官方检测信息查询平台</div>
</div>

<div class="top">
检测报告查询
</div>

<div class="card">

    <div class="row">
        <div class="left">报告编号</div>
        <div class="right">ZGC202602316</div>
    </div>

    <div class="row">
        <div class="left">送检单位</div>
        <div class="right">厦门市御华园伙聚餐饮管理有限公司</div>
    </div>

    <div class="row">
        <div class="left">样品名称</div>
        <div class="right">环境与卫生</div>
    </div>

    <div class="row">
        <div class="left">型号/规格</div>
        <div class="right">/</div>
    </div>

    <div class="row">
        <div class="left">报告时间</div>
        <div class="right">2026年05月21日</div>
    </div>

</div>

<div class="card">
    <div class="right" style="width:100%;display:block;">

        <p>首次查询时间：2026-05-21 18:22:31</p>

        <p>
            本次查询时间：
            <span id="nowTime"></span>
        </p>

    </div>
</div>

<div class="card">
    <div class="right" style="width:100%;display:block;">

        <p>
            1、本报告仅对本次送检样品负责。
        </p>

    </div>
</div>

<script>
function updateTime(){

    const now = new Date();

    const year = now.getFullYear();

    const month =
        String(now.getMonth()+1).padStart(2,'0');

    const day =
        String(now.getDate()).padStart(2,'0');

    const hour =
        String(now.getHours()).padStart(2,'0');

    const minute =
        String(now.getMinutes()).padStart(2,'0');

    const second =
        String(now.getSeconds()).padStart(2,'0');

    const timeStr =
        year + '-' +
        month + '-' +
        day + ' ' +
        hour + ':' +
        minute + ':' +
        second;

    document.getElementById("nowTime").innerText =
        timeStr;
}

updateTime();
</script>

</body>
</html>
