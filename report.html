<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测报告查询</title>

<style>
body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial;
}

.top{
    background:#1d9acb;
    color:white;
    text-align:center;
    padding:16px;
    font-size:20px;
    font-weight:500;
    letter-spacing:1px;
}

.card{
    background:white;
    margin:18px;
    border-radius:4px;
    overflow:hidden;
}

.row{
    display:flex;
    border-bottom:1px solid #e5e5e5;
    min-height:72px;
}

.left{
    width:32%;
    background:#9ec8e5;
    padding:16px;
    font-size:15px;
    font-weight:600;
    line-height:1.8;
    box-sizing:border-box;
}

.right{
    width:68%;
    padding:16px;
    font-size:15px;
    line-height:1.8;
    color:#333;
    box-sizing:border-box;
}

.footer{
    text-align:center;
    color:#999;
    margin-top:30px;
    font-size:16px;
}

</style>
</head>

<body>

<div class="header">
    <div class="header-title">
        检测报告查询系统
    </div>

    <div class="header-sub">
        官方检测信息查询平台
    </div>
</div>

<div class="top">
    检测报告查询
</div>

<div class="card">

    <div class="row">
        <div class="left">报告编号</div>
        <div class="right" id="report"></div>
    </div>

    <div class="row">
        <div class="left">送检单位</div>
        <div class="right" id="company"></div>
    </div>

    <div class="row">
        <div class="left">样品名称</div>
        <div class="right" id="sample"></div>
    </div>

    <div class="row">
        <div class="left">型号/规格</div>
        <div class="right" id="model"></div>
    </div>

    <div class="row">
        <div class="left">报告时间</div>
        <div class="right" id="date"></div>
    </div>

</div>

<div class="card">
    <div class="right" style="width:100%;display:block;">

        <p>
            首次查询时间：
            <span id="firstTime"></span>
        </p>

        <p>
            本次查询时间：
            <span id="nowTime"></span>
        </p>

    </div>
</div>

<div class="card">
    <div class="right" style="width:100%;display:block;">
        <p>
            1、本报告仅对本次送检样品负责。
        </p>
    </div>
</div>

<script>

/* 客户数据库 */

const data = {

"1001":{
    report:"ZGC202602316",
    company:"大福鼎有限公司",
    sample:"环境与卫生",
    model:"/",
    date:"2026年05月21日"
},

"1002":{
    report:"TEST20260002",
    company:"xx检测有限公司",
    sample:"食品卫生",
    model:"B-02",
    date:"2026年06月01日"
},

"1003":{
    report:"ABC888888",
    company:"xx环境科技有限公司",
    sample:"空气检测",
    model:"C-03",
    date:"2026年07月15日"
}

};

/* 获取二维码参数 */

const params =
    new URLSearchParams(window.location.search);

const id = params.get("id");

const info = data[id];

/* 显示客户数据 */

if(info){

document.getElementById("report").innerText =
    info.report;

document.getElementById("company").innerText =
    info.company;

document.getElementById("sample").innerText =
    info.sample;

document.getElementById("model").innerText =
    info.model;

document.getElementById("date").innerText =
    info.date;

}else{

document.body.innerHTML =
"<h2 style='text-align:center;margin-top:100px;'>未查询到报告</h2>";

}

/* 时间系统 */

function formatTime(date){

    const year = date.getFullYear();

    const month =
        String(date.getMonth()+1).padStart(2,'0');

    const day =
        String(date.getDate()).padStart(2,'0');

    const hour =
        String(date.getHours()).padStart(2,'0');

    const minute =
        String(date.getMinutes()).padStart(2,'0');

    const second =
        String(date.getSeconds()).padStart(2,'0');

    return year + '-' +
           month + '-' +
           day + ' ' +
           hour + ':' +
           minute + ':' +
           second;
}

const now = new Date();

/* 本次时间 */

document.getElementById("nowTime").innerText =
    formatTime(now);

/* 首次时间 */

let firstTime =
    localStorage.getItem("firstQueryTime_" + id);

if(!firstTime){

    firstTime = formatTime(now);

    localStorage.setItem(
        "firstQueryTime_" + id,
        firstTime
    );
}

document.getElementById("firstTime").innerText =
    firstTime;

</script>

</body>
</html>
